<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualisation de données - Leaflet</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        #map { height: 100vh; width: 100%; }
        .custom-popup b { color: #2c3e50; font-size: 1.1em; }
    </style>
</head>
<body>

    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- PapaParse pour lire le CSV -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

    <script>
        // Initialisation de la carte (Bordeaux par défaut)
        var map = L.map('map').setView([44.837789, -0.57918], 11);

        // Fond de carte CartoDB Positron (Sobre et propre)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        // Remplacer 'DATA.csv' par le nom réel du fichier
        const csvFile = 'DATA.csv';

        Papa.parse(csvFile, {
            download: true,
            header: false, // On désactive pour éviter les erreurs de noms en doublon
            skipEmptyLines: true,
            complete: function(results) {
                const data = results.data.slice(1); // On retire l'en-tête
                
                data.forEach(function(row) {
                    // À AJUSTER : Remplacez les index par les bons numéros de colonnes
                    const lat = parseFloat(row[0]); 
                    const lon = parseFloat(row[1]);

                    if (!isNaN(lat) && !isNaN(lon)) {
                        const marker = L.circleMarker([lat, lon], {
                            radius: 6,
                            fillColor: "#e67e22",
                            color: "#d35400",
                            weight: 1,
                            fillOpacity: 0.8
                        }).addTo(map);
                        
                        // À AJUSTER : Personnalisation de la popup
                        const popupContent = `
                            <div class="custom-popup">
                                <b>${row[1]}</b><br>
                                📍 ${row[2]}
                            </div>
                        `;
                        marker.bindPopup(popupContent);
                    }
                });
            }
        });
    </script>
</body>
</html>
